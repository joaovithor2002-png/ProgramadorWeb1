<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Operações</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>

<body>
    <div class="card" style="width: 28rem; margin: 20px auto;">
        <img src="img/dobro.jpeg" class="card-img-top" alt="Imagem ilustrativa">
        <div class="card-body">
            <h1>Calculadora de Operações</h1>

            <form id="numeroForm">
                <label for="numero">Digite um número:</label>
                <input type="number" id="numero" name="numero" class="form-control mb-2" placeholder="Digite um número" required>

                <label for="operacao">Escolha uma operação:</label>
                <select id="operacao" class="form-select mb-2" required>
                    <option value="quadrado">Quadrado</option>
                    <option value="cubo">Cubo</option>
                    <option value="raiz">Raiz</option>
                </select>

                <button type="submit" class="btn btn-success">Calcular</button>
            </form>

            <h5 class="card-title mt-3">Resultado:</h5>
            <p class="card-text" id="resultado"></p>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>

    <script src="script1.js" defer></script>
</body>

</html>
